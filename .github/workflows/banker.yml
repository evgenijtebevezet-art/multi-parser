name: banker
on:
  schedule:
    - cron: '47 6 * * *'
  workflow_dispatch:
    inputs:
      max_themes:
        description: 'How many fresh themes to process'
        type: string
        default: '5'
      dry_run:
        description: 'Skip yt-dlp + DB writes'
        type: boolean
        default: false

jobs:
  banker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U yt-dlp
          sudo apt-get update -y && sudo apt-get install -y ffmpeg
          yt-dlp --version
          ffmpeg -version | head -1
      - run: npm install --no-audit --no-fund
      - name: Run banker
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          CONTENT_BANK_VIDEOS_DIR: ./data/videos
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx src/banker/run.ts --max-themes ${{ inputs.max_themes || '5' }} --dry-run
          else
            npx tsx src/banker/run.ts --max-themes ${{ inputs.max_themes || '5' }}
          fi
      - name: Upload banker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: banker-${{ github.run_id }}
          path: |
            runs/**/banker/*.json
            data/videos/**
          if-no-files-found: ignore
          retention-days: 14
