name: banker
on:
  schedule:
    - cron: '47 6 * * *'
  workflow_dispatch:
    inputs:
      max_themes:
        description: 'How many fresh themes to process'
        type: string
        default: '5'
      dry_run:
        description: 'Skip yt-dlp + DB writes'
        type: boolean
        default: false

jobs:
  banker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U yt-dlp
          sudo apt-get update -y && sudo apt-get install -y ffmpeg
          yt-dlp --version
          ffmpeg -version | head -1
      - name: Materialize Bilibili cookies
        env:
          BILI_COOKIES_B64: ${{ secrets.BILI_COOKIES_B64 }}
        run: |
          if [ -z "${BILI_COOKIES_B64:-}" ]; then
            echo "::warning::BILI_COOKIES_B64 secret not set — yt-dlp will run without Bilibili cookies"
            exit 0
          fi
          printf '%s' "$BILI_COOKIES_B64" | base64 -d > "$RUNNER_TEMP/bili_cookies.txt"
          chmod 600 "$RUNNER_TEMP/bili_cookies.txt"
          echo "BILI_COOKIES_FILE=$RUNNER_TEMP/bili_cookies.txt" >> "$GITHUB_ENV"
          for marker in buvid3 buvid4 b_nut _uuid buvid_fp; do
            if ! grep -q "$marker" "$RUNNER_TEMP/bili_cookies.txt"; then
              echo "::warning::Bilibili cookie marker '$marker' missing"
            fi
          done
      - name: Start VPN proxy (mihomo)
        env:
          VPN_SUB_URL: ${{ secrets.VPN_SUB_URL }}
        run: |
          if [ -z "${VPN_SUB_URL:-}" ]; then
            echo "::notice::VPN_SUB_URL not set — yt-dlp runs without proxy (Bilibili-only effective)"
            exit 0
          fi
          # Install mihomo (Clash.Meta) — the subscription is Clash-format JSON.
          MIHOMO_VER="v1.18.10"
          curl -fsSL --retry 3 -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-${MIHOMO_VER}.gz"
          gunzip -f /tmp/mihomo.gz && chmod +x /tmp/mihomo && sudo mv /tmp/mihomo /usr/local/bin/mihomo
          mkdir -p "$RUNNER_TEMP/clash"
          # Fetch subscription (Clash.Meta JSON, often a JSON ARRAY with \uXXXX server
          # names). Parse as JSON via node, take element 0, force local port/mode, and
          # write as JSON (mihomo reads JSON configs fine) — avoids the YAML Unicode-escape
          # parse error you get from appending YAML lines to a JSON body.
          curl -fsSL --retry 3 "$VPN_SUB_URL" -o "$RUNNER_TEMP/clash/sub.raw"
          node -e '
            const fs=require("fs");
            const raw=fs.readFileSync(process.env.RUNNER_TEMP+"/clash/sub.raw","utf8");
            const d=JSON.parse(raw);
            const cfg=Array.isArray(d)?d[0]:d;
            cfg["mixed-port"]=7890;
            cfg["allow-lan"]=false;
            cfg["external-controller"]="127.0.0.1:9090";
            delete cfg["port"]; delete cfg["socks-port"];
            const proxies=Array.isArray(cfg.proxies)?cfg.proxies:[];
            const names=proxies.map(p=>p&&p.name).filter(Boolean);
            if(names.length===0) console.error("::warning::no Clash proxies in subscription (sing-box format?) — VPN will not route");
            // Force ALL traffic through the fastest node (url-test) — the sub`s own
            // rules often send CN sites (Bilibili) DIRECT, i.e. via the Azure runner
            // IP, which keeps the 412. MATCH->AUTO removes that leak.
            cfg["proxy-groups"]=[{name:"AUTO",type:"url-test",url:"http://www.gstatic.com/generate_204",interval:300,tolerance:150,proxies:names.length?names:["DIRECT"]}];
            cfg["rules"]=["MATCH,AUTO"];
            cfg["mode"]="rule";
            fs.writeFileSync(process.env.RUNNER_TEMP+"/clash/config.yaml", JSON.stringify(cfg));
            console.log("clash config: nodes="+names.length+", routing=MATCH->AUTO(url-test)");
          '
          nohup mihomo -d "$RUNNER_TEMP/clash" > "$RUNNER_TEMP/clash/mihomo.log" 2>&1 &
          # Confirm the proxy actually CHANGES our egress IP (catches dead node / route leak).
          DIRECT_IP=$(curl -s --max-time 10 https://api.ipify.org || echo "direct-unknown")
          echo "runner direct egress: ${DIRECT_IP}"
          for i in $(seq 1 30); do
            PROXY_IP=$(curl -s --max-time 8 -x http://127.0.0.1:7890 https://api.ipify.org 2>/dev/null || echo "")
            if [ -n "$PROXY_IP" ] && [ "$PROXY_IP" != "$DIRECT_IP" ]; then
              echo "::notice::VPN up — egress ${PROXY_IP} (runner ${DIRECT_IP})"
              echo "YTDLP_PROXY=http://127.0.0.1:7890" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done
          echo "::warning::VPN not routing (egress unreachable or == runner IP) — continuing WITHOUT proxy"
          tail -20 "$RUNNER_TEMP/clash/mihomo.log" || true
      - run: npm install --no-audit --no-fund
      - name: Run banker
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_QUOTA_PROJECT: ${{ secrets.GDRIVE_QUOTA_PROJECT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          CONTENT_BANK_VIDEOS_DIR: ./data/videos
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx src/banker/run.ts --max-themes ${{ inputs.max_themes || '5' }} --dry-run
          else
            npx tsx src/banker/run.ts --max-themes ${{ inputs.max_themes || '5' }}
          fi
      - name: Upload banker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: banker-${{ github.run_id }}
          path: |
            runs/**/banker/*.json
            data/videos/**
          if-no-files-found: ignore
          retention-days: 14
