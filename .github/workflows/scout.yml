name: scout
on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      allow_fallback_seed:
        description: 'Use hardcoded seed if LLM cascade fails'
        type: boolean
        default: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: Run scout
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_CX: ${{ secrets.SEARCH_CX }}
          # Optional comma-separated query override; set repo variable SEARCH_QUERIES
          # to steer scout grounding. Empty/unset falls back to DEFAULT_QUERIES.
          SEARCH_QUERIES: ${{ vars.SEARCH_QUERIES }}
        run: |
          if [ "${{ inputs.allow_fallback_seed }}" = "true" ]; then
            npx tsx src/scout/run.ts --allow-fallback-seed
          else
            npx tsx src/scout/run.ts
          fi
      - name: Upload scout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scout-${{ github.run_id }}
          path: runs/**/scout/*.json
          if-no-files-found: ignore
          retention-days: 14
